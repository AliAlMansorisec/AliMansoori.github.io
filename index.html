  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Person","name":"Ali Al-Mansouri","jobTitle":"Security Researcher","url":"https://AliAlMansorisec.github.io","sameAs":["https://github.com/AliAlMansori","https://linkedin.com/in/username","https://x.com/username"]}</script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg:    #000;
      --card:  #0b0b0b;
      --raise: #141414;
      --edge:  rgba(255,255,255,0.07);
      --edgehi:rgba(255,255,255,0.18);
      --white: #fff;
      --pearl: #e6e6e6;
      --silver:#a8a8a8;
      --stone: #606060;
      --ghost: #303030;
      --serif:'Cormorant Garamond',Georgia,serif;
      --mono: 'DM Mono',monospace;
      --sans: 'DM Sans',system-ui,sans-serif;
      --ease: cubic-bezier(0.22,1,0.36,1);
    }

    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{-webkit-font-smoothing:antialiased;}

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.2rem;
      font-family: var(--sans);
      overflow-x: hidden;
    }

    body::before {
      content:'';
      position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px);
      background-size:80px 80px;
      mask-image:radial-gradient(ellipse 60% 60% at 50% 40%,black,transparent 80%);
      pointer-events:none;z-index:0;
    }

    /* ══ CARD ══ */
    .card {
      position:relative;z-index:1;
      max-width:580px;width:100%;
      background:var(--card);
      border:1px solid var(--edge);
      border-radius:32px;
      padding:3rem 2.8rem 3.2rem;
      display:flex;flex-direction:column;align-items:center;
      overflow:hidden;
    }

    .card::before {
      content:'';position:absolute;
      top:0;left:10%;right:10%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
    }

    /* stagger */
    .card>*{opacity:0;animation:up .75s var(--ease) forwards;}
    .card>*:nth-child(1){animation-delay:.05s;}
    .card>*:nth-child(2){animation-delay:.13s;}
    .card>*:nth-child(3){animation-delay:.21s;}
    .card>*:nth-child(4){animation-delay:.29s;}
    .card>*:nth-child(5){animation-delay:.37s;}
    .card>*:nth-child(6){animation-delay:.43s;}
    .card>*:nth-child(7){animation-delay:.49s;}
    .card>*:nth-child(8){animation-delay:.55s;}

    @keyframes up{
      from{opacity:0;transform:translateY(24px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* ══ AVATAR ══ */
    .avatar-wrap{
      margin-bottom:1.8rem;
      position:relative;width:124px;height:124px;flex-shrink:0;
    }
    .avatar-wrap::before{
      content:'';position:absolute;inset:-4px;border-radius:50%;
      background:conic-gradient(
        from 0deg,
        transparent 0%,rgba(255,255,255,.9) 12%,
        transparent 24%,rgba(255,255,255,.08) 50%,
        transparent 64%,rgba(255,255,255,.9) 88%,
        transparent 100%
      );
      animation:spin 6s linear infinite;
    }
    .avatar-wrap::after{
      content:'';position:absolute;inset:2px;
      background:var(--card);border-radius:50%;z-index:1;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .avatar-img{
      position:absolute;inset:6px;
      width:calc(100% - 12px);height:calc(100% - 12px);
      border-radius:50%;object-fit:cover;z-index:2;background:var(--raise);
    }
    .avatar-fb{
      position:absolute;inset:6px;border-radius:50%;background:var(--raise);
      display:none;align-items:center;justify-content:center;font-size:42px;z-index:2;
    }

    /* ══ STATUS ══ */
    .status{
      display:inline-flex;align-items:center;gap:9px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.16);
      padding:7px 22px;border-radius:100px;
      font-family:var(--mono);font-size:0.72rem;
      color:var(--pearl);letter-spacing:1.2px;text-transform:uppercase;
      margin-bottom:1.6rem;
      box-shadow:0 0 18px rgba(255,255,255,0.04);
    }
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--white);
      box-shadow:0 0 10px rgba(255,255,255,1),0 0 20px rgba(255,255,255,.5);
      animation:pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.8);}}

    /* ══ NAME ══ */
    .name{
      font-family:var(--serif);
      font-size:4.4rem;font-weight:300;
      color:var(--white);text-align:center;
      line-height:1.02;letter-spacing:.5px;
      margin-bottom:.9rem;
    }
    .name span{font-style:italic;color:var(--pearl);}

    /* ══ SPEC ══ */
    .spec-row{
      display:flex;flex-wrap:wrap;justify-content:center;
      gap:7px;margin-bottom:2.2rem;
    }
    .spec{
      font-family:var(--mono);font-size:0.68rem;
      letter-spacing:2px;text-transform:uppercase;
      color:var(--stone);padding:6px 16px;
      border:1px solid var(--edge);border-radius:100px;
      background:rgba(255,255,255,0.025);
    }

    /* ══ RULE ══ */
    .rule{
      width:100%;height:1px;
      background:linear-gradient(90deg,transparent,var(--edgehi),transparent);
      margin-bottom:2.2rem;
    }

    /* ══ CV BUTTON — LUXURY ══ */
    .cv-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 15px 40px;
      border-radius: 100px;
      text-decoration: none;
      font-family: var(--sans);
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--white);
      margin-bottom: 2.6rem;
      overflow: hidden;
      transition: all .3s var(--ease);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.9),
        0 8px 32px rgba(255,255,255,0.15),
        0 2px 8px rgba(0,0,0,0.6);
    }

    /* spinning arc around CV button */
    .cv-btn-wrap {
      position: relative;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 2.6rem;
    }

    /* remove margin from btn itself now wrapper handles it */
    .cv-btn { margin-bottom: 0; }

    .cv-btn-wrap::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 100px;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255,255,255,0.9) 12%,
        transparent 28%,
        rgba(255,255,255,0.05) 55%,
        transparent 68%,
        rgba(255,255,255,0.9) 88%,
        transparent 100%
      );
      animation: spin 4s linear infinite;
      z-index: 0;
    }

    .cv-btn-wrap::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 100px;
      background: var(--card);
      z-index: 1;
    }

    .cv-btn { z-index: 2; }

    /* inner shimmer sweep */
    .cv-btn .shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg,
        transparent 30%,
        rgba(255,255,255,0.35) 50%,
        transparent 70%
      );
      transform: translateX(-100%);
      transition: transform .55s ease;
    }

    .cv-btn:hover .shine { transform: translateX(100%); }

    .cv-btn i {
      font-size: 1rem;
      transition: transform .3s var(--ease);
    }

    .cv-btn:hover {
      background: var(--pearl);
      transform: translateY(-3px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.8),
        0 16px 48px rgba(255,255,255,0.22),
        0 4px 12px rgba(0,0,0,0.6);
    }

    .cv-btn:hover i { transform: translateY(2px); }
    .cv-btn:active  { transform: translateY(0); }

    /* ══ SOCIAL ══ */
    .social-label{
      font-family:var(--mono);font-size:0.62rem;
      letter-spacing:4px;text-transform:uppercase;
      color:var(--ghost);margin-bottom:1.2rem;text-align:center;
    }

    .social-grid{
      display:grid;grid-template-columns:repeat(3,1fr);
      gap:10px;width:100%;
    }

    /* each social card */
    .soc {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 22px 10px 17px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 18px;
      text-decoration: none;
      color: var(--white);           /* WHITE icons by default */
      transition: all .3s var(--ease);
      position: relative;
      overflow: hidden;
    }

    /* spinning arc — hidden by default, shown on hover */
    .soc::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 18px;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255,255,255,0.85) 10%,
        transparent 22%,
        rgba(255,255,255,0.04) 50%,
        transparent 62%,
        rgba(255,255,255,0.85) 88%,
        transparent 100%
      );
      opacity: 0;
      animation: spin 3.5s linear infinite;
      transition: opacity .3s ease;
      z-index: 0;
    }

    /* mask the gap */
    .soc .inner {
      position: absolute;
      inset: 1px;
      background: rgba(15,15,15,0.95);
      border-radius: 17px;
      z-index: 1;
    }

    .soc i, .soc .soc-name {
      position: relative;
      z-index: 2;
    }

    .soc i {
      font-size: 1.9rem;
      line-height: 1;
      color: var(--white);
      transition: transform .3s var(--ease), color .3s;
    }

    .soc-name {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: .5px;
      color: var(--silver);
      transition: color .3s;
    }

    .soc:hover::before { opacity: 1; }

    .soc:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,.8);
      border-color: transparent;
    }

    .soc:hover i          { transform: scale(1.18); color: var(--white); }
    .soc:hover .soc-name  { color: var(--white); }

    /* ══ RESPONSIVE ══ */
    @media(max-width:520px){
      body{padding:1.2rem .8rem;}
      .card{padding:2.2rem 1.5rem 2.6rem;border-radius:26px;}
      .name{font-size:3.2rem;}
      .soc{padding:17px 8px 13px;}
      .soc i{font-size:1.6rem;}
    }
    @media(max-width:360px){
      .social-grid{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>

    <a href="https://t.me/username"

    <a href="https://instagram.com/username"

    <a href="mailto:your.email@example.com"

  </nav>

</main>

</body>
