<html lang="en">
<head>

  <meta property="og:url"         content="https://AliAlMansorisec.github.io" />

  <meta name="twitter:card"        content="summary" />

  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"Person",

    "jobTitle":"Security Researcher & Penetration Tester",
    "url":"https://AliAlMansorisec.github.io",

      "https://github.com/AliAlMansori",

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg:     #000;
      --card:   #0b0b0b;
      --raise:  #141414;
      --edge:   rgba(255,255,255,0.07);
      --edgehi: rgba(255,255,255,0.18);
      --white:  #fff;
      --pearl:  #e6e6e6;
      --silver: #a8a8a8;
      --stone:  #626262;
      --ghost:  #323232;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --mono:  'DM Mono', monospace;
      --sans:  'DM Sans', system-ui, sans-serif;
      --ease:  cubic-bezier(0.22,1,0.36,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { -webkit-font-smoothing:antialiased; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.2rem;
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ── subtle grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 40%, black, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════════
       CARD
    ══════════════════════ */
    .card {
      position: relative;
      z-index: 1;
      max-width: 580px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--edge);
      border-radius: 32px;
      padding: 3rem 2.8rem 3.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      overflow: hidden;
    }

    /* top shimmer */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
    }

    /* ── entrance animations ── */
    .card > * {
      opacity: 0;
      animation: up .75s var(--ease) forwards;
    }
    .card > *:nth-child(1) { animation-delay:.05s; }
    .card > *:nth-child(2) { animation-delay:.13s; }
    .card > *:nth-child(3) { animation-delay:.21s; }
    .card > *:nth-child(4) { animation-delay:.29s; }
    .card > *:nth-child(5) { animation-delay:.37s; }
    .card > *:nth-child(6) { animation-delay:.43s; }
    .card > *:nth-child(7) { animation-delay:.49s; }

    @keyframes up {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ══════════════════════
       1. AVATAR
    ══════════════════════ */
    .avatar-wrap {
      margin-bottom: 1.8rem;
      position: relative;
      width: 124px;
      height: 124px;
      flex-shrink: 0;
    }

    /* spinning arc */
    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%, rgba(255,255,255,.9) 12%,
        transparent 24%, rgba(255,255,255,.08) 50%,
        transparent 64%, rgba(255,255,255,.9) 88%,
        transparent 100%
      );
      animation: spin 6s linear infinite;
    }

    /* mask gap */
    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: 2px;
      background: var(--card);
      border-radius: 50%;
      z-index: 1;
    }

    @keyframes spin { to { transform:rotate(360deg); } }

    .avatar-img {
      position: absolute;
      inset: 6px;
      width: calc(100% - 12px);
      height: calc(100% - 12px);
      border-radius: 50%;
      object-fit: cover;
      z-index: 2;
      background: var(--raise);
    }

    .avatar-fb {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      background: var(--raise);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      z-index: 2;
    }

    /* ══════════════════════
       2. STATUS — PROMINENT
    ══════════════════════ */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      padding: 7px 22px;
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--pearl);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      box-shadow: 0 0 18px rgba(255,255,255,0.04);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--white);
      box-shadow: 0 0 10px rgba(255,255,255,1), 0 0 20px rgba(255,255,255,.5);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.35; transform:scale(.8); }
    }

    /* ══════════════════════
       3. NAME — LUXURY
    ══════════════════════ */
    .name {
      font-family: var(--serif);
      font-size: 4.4rem;
      font-weight: 300;
      color: var(--white);
      text-align: center;
      line-height: 1.02;
      letter-spacing: .5px;
      margin-bottom: .9rem;
    }

    .name span {
      font-style: italic;
      color: var(--pearl);
    }

    /* ══════════════════════
       4. SPECIALISATION
    ══════════════════════ */
    .spec-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 7px;
      margin-bottom: 2.2rem;
    }

    .spec {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--stone);
      padding: 6px 16px;
      border: 1px solid var(--edge);
      border-radius: 100px;
      background: rgba(255,255,255,0.025);
    }

    /* ══════════════════════
       RULE
    ══════════════════════ */
    .rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--edgehi), transparent);
      margin-bottom: 2.2rem;
    }

    /* ══════════════════════
       5. CV BUTTON
    ══════════════════════ */
    .cv-btn {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      background: var(--white);
      color: var(--bg);
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: .4px;
      padding: 14px 34px;
      border-radius: 100px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all .28s var(--ease);
      margin-bottom: 2.4rem;
      box-shadow: 0 8px 28px rgba(255,255,255,0.12);
      position: relative;
      overflow: hidden;
    }

    .cv-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.18) 100%);
      opacity: 0;
      transition: opacity .25s ease;
    }

    .cv-btn i { font-size: .95rem; transition: transform .3s var(--ease); }

    .cv-btn:hover {
      background: var(--pearl);
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(255,255,255,0.18);
    }

    .cv-btn:hover::before { opacity: 1; }
    .cv-btn:hover i { transform: translateY(2px); }

    .cv-btn:active { transform: translateY(0); }

    /* ══════════════════════
       6. SOCIAL ICONS
    ══════════════════════ */
    .social-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ghost);
      margin-bottom: 1.2rem;
      text-align: center;
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .soc {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 10px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      text-decoration: none;
      color: var(--stone);
      transition: all .3s var(--ease);
      position: relative;
      overflow: hidden;
    }

    /* shimmer on hover */
    .soc::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), transparent);
      transition: left .4s ease;
    }

    .soc:hover::after { left: 150%; }

    .soc i {
      font-size: 1.75rem;
      transition: transform .3s var(--ease), color .3s;
    }

    .soc-name {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: .4px;
      transition: color .3s;
    }

    .soc:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-5px);
      box-shadow: 0 16px 36px rgba(0,0,0,.7);
    }

    .soc:hover i       { transform: scale(1.15); }
    .soc:hover .soc-name { color: var(--pearl); }

    /* brand tints */
    .soc.github:hover   i { color:#fff; }
    .soc.x:hover        i { color:#d0d0d0; }
    .soc.linkedin:hover i { color:#6db3df; }
    .soc.telegram:hover i { color:#5bc8f5; }
    .soc.instagram:hover i { color:#e07898; }
    .soc.email:hover    i { color:#f09878; }

    /* ══════════════════════
       RESPONSIVE
    ══════════════════════ */
    @media (max-width: 520px) {
      body { padding: 1.2rem .8rem; }
      .card { padding: 2.2rem 1.6rem 2.6rem; border-radius: 26px; }
      .name { font-size: 3.2rem; }
      .social-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
      .soc { padding: 16px 8px 13px; }
      .soc i { font-size: 1.5rem; }
    }

    @media (max-width: 360px) {
      .social-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<main class="card" role="main" itemscope itemtype="https://schema.org/Person">

  <!-- 1 · Avatar -->
  <div class="avatar-wrap" aria-label="Profile picture">

  <h1 class="name" itemprop="name">

  <!-- 4 · Specialisation -->
  <div class="spec-row" role="list" aria-label="Specialisations">

    <span class="spec" role="listitem">BAC · IDOR · Business Logic</span>
  </div>

  <!-- divider -->
  <div class="rule" aria-hidden="true"></div>

  <a href="cv.pdf" class="cv-btn" download aria-label="Download CV">

  <!-- 6 · Social -->
  <p class="social-label">Connect</p>
  <nav class="social-grid" aria-label="Social profiles">

    <a href="https://github.com/AliAlMansori"
       class="soc github" target="_blank" rel="noopener noreferrer"
       aria-label="GitHub" itemprop="sameAs">
      <i class="fa-brands fa-github" aria-hidden="true"></i>
      <span class="soc-name">GitHub</span>
    </a>

    <a href="https://x.com/username"
       class="soc x" target="_blank" rel="noopener noreferrer"
       aria-label="X / Twitter" itemprop="sameAs">
      <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
      <span class="soc-name">X</span>
    </a>

    <a href="https://linkedin.com/in/username"
       class="soc linkedin" target="_blank" rel="noopener noreferrer"
       aria-label="LinkedIn" itemprop="sameAs">
      <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
      <span class="soc-name">LinkedIn</span>
    </a>

    <a href="https://t.me/username"
       class="soc telegram" target="_blank" rel="noopener noreferrer"
       aria-label="Telegram">
      <i class="fa-brands fa-telegram" aria-hidden="true"></i>
      <span class="soc-name">Telegram</span>
    </a>

    <a href="https://instagram.com/username"
       class="soc instagram" target="_blank" rel="noopener noreferrer"
       aria-label="Instagram" itemprop="sameAs">

      <span class="soc-name">Instagram</span>
    </a>

    <a href="mailto:your.email@example.com"
       class="soc email" aria-label="Email">
      <i class="fa-regular fa-envelope" aria-hidden="true"></i>
      <span class="soc-name">Email</span>
    </a>

  </nav>

</main>

</body>
</html>
